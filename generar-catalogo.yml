name: Generar Catálogo de Piezas

on:
  push:
    branches: [main]
    paths:
      - 'piezas/**'

  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Generar piezas/index.json
        run: |
          python3 - <<'EOF'
          import json, os, glob

          piezas = []
          fichas = glob.glob("piezas/**/ficha.json", recursive=True)

          for ruta in sorted(fichas):
              carpeta = os.path.dirname(ruta)
              nombre_carpeta = os.path.basename(carpeta)
              try:
                  with open(ruta, "r", encoding="utf-8") as f:
                      datos = json.load(f)
                  # Normalizar ruta de imagen relativa al repositorio
                  if "imagen" in datos and not datos["imagen"].startswith("http"):
                      datos["imagen"] = f"piezas/{nombre_carpeta}/{datos['imagen']}"
                  piezas.append(datos)
              except Exception as e:
                  print(f"Error en {ruta}: {e}")

          with open("piezas/index.json", "w", encoding="utf-8") as f:
              json.dump(piezas, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(piezas)} pieza(s) indexada(s)")
          EOF

      - name: Commit y push del índice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add piezas/index.json
          git diff --cached --quiet || git commit -m "🤖 Auto: actualizar catálogo de piezas"
          git push
